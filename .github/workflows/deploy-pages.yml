name: CI/CD (GitHub Pages)

on:
  pull_request:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Project to deploy to GitHub Pages
        type: choice
        required: true
        default: none
        options:
          - none
          - moment
          - stavebni
          - hivehouse
          - cars
          - pekarna
          - all

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}-${{ github.event.inputs.deploy_target || 'ci' }}
  cancel-in-progress: true

env:
  VITE_FIREBASE_API_KEY: ${{ secrets.DEV_VITE_FIREBASE_API_KEY }}
  VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.DEV_VITE_FIREBASE_AUTH_DOMAIN }}
  VITE_FIREBASE_DATABASE_URL: ${{ secrets.DEV_VITE_FIREBASE_DATABASE_URL }}
  VITE_FIREBASE_PROJECT_ID: ${{ secrets.DEV_VITE_FIREBASE_PROJECT_ID }}
  VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.DEV_VITE_FIREBASE_STORAGE_BUCKET }}
  VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.DEV_VITE_FIREBASE_MESSAGING_SENDER_ID }}
  VITE_FIREBASE_APP_ID: ${{ secrets.DEV_VITE_FIREBASE_APP_ID }}
  VITE_GA_MEASUREMENT_ID: ${{ secrets.DEV_VITE_GA_MEASUREMENT_ID }}

jobs:
  quality:
    name: Lint, Unit Tests & Build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: moment
            path: 2p-moment
            node-version: 22
            build-env: ''
          - name: stavebni
            path: 2p-Stavebni
            node-version: 22
            build-env: DEPLOY_TARGET=github-pages
          - name: hivehouse
            path: 2p-hive-house
            node-version: 22
            build-env: VITE_BASE=/2p-hive-house/
          - name: cars
            path: 2p-cars
            node-version: 22
            build-env: ''
          - name: pekarna
            path: 2p-pekarna
            node-version: 22
            build-env: VITE_BASE=/2p-pekarna/

    defaults:
      run:
        working-directory: ${{ matrix.path }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Build module
        run: |
          if [ -n "${{ matrix.build-env }}" ]; then
            env ${{ matrix.build-env }} npm run build
          else
            npm run build
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-pages-dist
          path: ${{ matrix.path }}/dist
          if-no-files-found: error
          retention-days: 7

  deploy-moment:
    name: Deploy Moment to GitHub Pages
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.deploy_target == 'moment' || github.event.inputs.deploy_target == 'all')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Moment build artifact
        uses: actions/download-artifact@v4
        with:
          name: moment-pages-dist
          path: dist

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-stavebni:
    name: Deploy Stavebni to GitHub Pages
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.deploy_target == 'stavebni' || github.event.inputs.deploy_target == 'all')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Stavebni build artifact
        uses: actions/download-artifact@v4
        with:
          name: stavebni-pages-dist
          path: dist

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-hivehouse:
    name: Deploy HiveHouse to GitHub Pages
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.deploy_target == 'hivehouse' || github.event.inputs.deploy_target == 'all')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download HiveHouse build artifact
        uses: actions/download-artifact@v4
        with:
          name: hivehouse-pages-dist
          path: dist

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-cars:
    name: Deploy Cars to GitHub Pages
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.deploy_target == 'cars' || github.event.inputs.deploy_target == 'all')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Cars build artifact
        uses: actions/download-artifact@v4
        with:
          name: cars-pages-dist
          path: dist

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-pekarna:
    name: Deploy Pekarna to GitHub Pages
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.deploy_target == 'pekarna' || github.event.inputs.deploy_target == 'all')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Pekarna build artifact
        uses: actions/download-artifact@v4
        with:
          name: pekarna-pages-dist
          path: dist

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
