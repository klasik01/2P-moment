    <script>
      (function () {
        try {
          var target = sessionStorage.getItem("spa:redirect");
          if (target) {
            sessionStorage.removeItem("spa:redirect");
            if (target !== location.pathname + location.search + location.hash) {
              history.replaceState({}, "", target);
            }
          }
        } catch (_) {}
      })();
    </script>
